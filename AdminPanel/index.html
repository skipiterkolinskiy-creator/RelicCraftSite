<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AdminPanel Local - RelicCraft</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .admin-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 120px 20px 60px;
    }

    .admin-box {
      width: min(460px, 100%);
      border: 1px solid rgba(243, 248, 239, .16);
      border-radius: 8px;
      background: rgba(10, 22, 14, .84);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .34);
      padding: 28px;
    }

    .admin-box h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 6vw, 54px);
    }

    .admin-box p {
      color: var(--muted);
      margin: 0 0 22px;
    }

    .admin-form {
      display: grid;
      gap: 14px;
    }

    .admin-form label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .admin-form input {
      width: 100%;
      border: 1px solid rgba(243, 248, 239, .18);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      padding: 14px 16px;
      outline: none;
    }

    .admin-error {
      color: #ffc857;
      font-weight: 900;
      margin: 0;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="sky"></div>

  <main class="admin-shell">
    <section class="admin-box" id="login-box">
      <div class="eyebrow">AdminPanel</div>
      <h1>Локальный вход</h1>
      <p>Это локальный просмотр через file://. На хостинге защищённый вход работает через index.php.</p>
      <form class="admin-form" id="local-login" autocomplete="off">
        <label>
          Username
          <input name="username" type="text" required autocomplete="username">
        </label>
        <label>
          Password
          <input name="password" type="password" required autocomplete="current-password">
        </label>
        <p class="admin-error" id="local-error" hidden>Неверный логин или пароль.</p>
        <button class="btn" type="submit"><span>Войти</span></button>
      </form>
    </section>

    <section class="admin-box" id="admin-box" hidden>
      <div class="eyebrow">AdminPanel</div>
      <h1>Доступ открыт</h1>
      <p>Локально форма открылась. На хостинге эта же страница будет защищена серверным PHP-входом.</p>
      <div class="admin-actions">
        <a class="btn" href="../index.html"><span>На сайт</span></a>
        <button class="btn alt" type="button" id="local-logout"><span>Выйти</span></button>
      </div>
    </section>
  </main>

  <script>
    const loginBox = document.querySelector("#login-box");
    const adminBox = document.querySelector("#admin-box");
    const form = document.querySelector("#local-login");
    const error = document.querySelector("#local-error");
    const logout = document.querySelector("#local-logout");

    async function digest(value) {
      const data = new TextEncoder().encode(value);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash), (byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function showAdmin() {
      loginBox.hidden = true;
      adminBox.hidden = false;
    }

    if (sessionStorage.getItem("reliccraftLocalAdmin") === "1") {
      showAdmin();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const username = String(data.get("username") || "").trim();
      const password = String(data.get("password") || "");
      const passwordHash = await digest(password);

      if (username === "PivoVarReshaet" && passwordHash === "02808219b0484fb9a7a7afcec976f1ea12d46158f51de1f932e94c4d738e6ea0") {
        sessionStorage.setItem("reliccraftLocalAdmin", "1");
        showAdmin();
      } else {
        error.hidden = false;
      }
    });

    logout.addEventListener("click", () => {
      sessionStorage.removeItem("reliccraftLocalAdmin");
      window.location.reload();
    });
  </script>
  <script src="../script.js"></script>
</body>
</html>
