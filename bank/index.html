<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RelicBank - RelicCraft</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { opacity: 1 !important; transform: none !important; filter: none !important; }
    .bank-page { min-height: 100vh; padding: 72px 0; }
    .bank-layout { display: grid; grid-template-columns: minmax(280px, 380px) minmax(0, 1fr); gap: 18px; align-items: start; }
    .bank-card { border: 1px solid rgba(255,255,255,.14); border-radius: 8px; background: rgba(8,18,14,.82); box-shadow: 0 20px 70px rgba(0,0,0,.32); padding: 22px; backdrop-filter: blur(18px); }
    .bank-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
    .bank-box { border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: rgba(255,255,255,.06); padding: 16px; min-width: 0; }
    .bank-box small { display: block; color: var(--muted, #b9c8b6); margin-bottom: 8px; font-weight: 800; }
    .bank-box strong { display: block; font-size: clamp(22px, 4vw, 34px); overflow-wrap: anywhere; }
    .bank-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
    .bank-form { display: grid; gap: 12px; }
    .bank-form label { display: grid; gap: 7px; color: var(--muted, #b9c8b6); font-size: 13px; font-weight: 800; }
    .bank-form input { width: 100%; min-height: 46px; border: 1px solid rgba(255,255,255,.18); border-radius: 8px; background: rgba(255,255,255,.09); color: var(--text, #f3f8ef); padding: 0 13px; font: inherit; outline: none; }
    .bank-form input::placeholder { color: rgba(243,248,239,.45); }
    .bank-note { color: var(--muted, #b9c8b6); line-height: 1.55; }
    .bank-status { min-height: 22px; color: var(--gold, #ffc857); font-weight: 900; }
    .bank-status.ok { color: var(--green, #44d17a); }
    .bank-status.bad { color: var(--danger, #ff7b61); }
    .bank-history { display: grid; gap: 8px; max-height: 340px; overflow: auto; }
    .bank-row { display: flex; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.1); }
    .bank-row span { display: block; color: var(--muted, #b9c8b6); margin-top: 4px; font-size: 13px; }
    .plus { color: var(--green, #44d17a); }
    .minus { color: var(--danger, #ff7b61); }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .bank-layout, .bank-grid, .bank-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <nav class="nav">
    <div class="wrap nav-inner">
      <a class="brand" href="../"><span class="brand-mark">RC</span><span>RelicCraft</span></a>
      <div class="nav-links">
        <a href="../">Главная</a>
        <a href="../start/">Как начать</a>
        <a href="../features/">Фишки</a>
        <a href="../voice/">Войс чат</a>
        <a href="../rules/">Правила</a>
        <a class="active" href="../bank/">Банк</a>
        <a href="../discord/">Discord</a>
      </div>
    </div>
  </nav>

  <main class="bank-page">
    <section class="page-title">
      <div class="wrap">
        <div class="eyebrow">RelicBank</div>
        <h1>Банк сервера</h1>
        <p>HTML-версия банка для сайта. Данные сохраняются в браузере игрока.</p>
      </div>
    </section>

    <section class="wrap bank-layout">
      <aside class="bank-card" id="loginBox">
        <h2>Вход</h2>
        <p class="bank-note">Если аккаунта нет, он создастся при первом входе.</p>
        <form class="bank-form" id="loginForm">
          <label>Ник<input id="username" placeholder="PixelPivo" minlength="3" maxlength="16" required></label>
          <label>Пароль<input id="password" type="password" minlength="4" required></label>
          <button class="btn" type="submit"><span>Войти</span></button>
        </form>
        <p class="bank-status" id="loginStatus"></p>
      </aside>

      <section class="bank-card hidden" id="bankPanel">
        <div class="bank-grid">
          <div class="bank-box"><small>Игрок</small><strong id="playerName">-</strong></div>
          <div class="bank-box"><small>Номер счёта</small><strong id="accountNumber">-</strong></div>
          <div class="bank-box"><small>Баланс</small><strong id="balance">0$</strong></div>
        </div>

        <div class="bank-actions">
          <article class="bank-box">
            <h2>Перевод</h2>
            <form class="bank-form" id="transferForm">
              <label>Номер счёта получателя<input id="toAccount" placeholder="1488-TK" required></label>
              <label>Сумма<input id="transferAmount" type="number" min="1" step="1" required></label>
              <label>Комментарий<input id="comment" maxlength="60" placeholder="За ресурсы"></label>
              <button class="btn" type="submit"><span>Отправить</span></button>
            </form>
          </article>

          <article class="bank-box">
            <h2>Долг</h2>
            <form class="bank-form" id="loanForm">
              <label>Сумма<input id="loanAmount" type="number" min="1" max="50000" step="1" required></label>
              <button class="btn" type="submit"><span>Взять в долг</span></button>
              <button class="btn alt" id="repayBtn" type="button"><span>Погасить долг</span></button>
            </form>
            <p class="bank-note">Текущий долг: <b id="debt">0$</b></p>
          </article>
        </div>

        <div class="bank-actions" style="margin:16px 0;">
          <button class="btn alt" id="copyBtn" type="button"><span>Скопировать счёт</span></button>
          <button class="btn alt" id="bonusBtn" type="button"><span>Получить тестовые 500$</span></button>
          <button class="btn alt" id="logoutBtn" type="button"><span>Выйти</span></button>
        </div>

        <p class="bank-status" id="status"></p>

        <div class="bank-box">
          <h2>История операций</h2>
          <div class="bank-history" id="history"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="../script.js"></script>
  <script src="bank.js?v=static-users-1"></script>
</body>
</html>
